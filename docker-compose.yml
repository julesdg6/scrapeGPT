services:
  scrapegoat:
    build:
      context: .
      args:
        # Set PYTORCH_FLAVOR=cu121 (or cu118, etc.) in your .env for NVIDIA GPU support.
        # Leave unset or 'cpu' for a smaller CPU-only image (~1.5 GB lighter).
        PYTORCH_FLAVOR: ${PYTORCH_FLAVOR:-cpu}
    image: scrapegoat:latest
    container_name: scrapegoat
    ports:
      - "${GRADIO_PORT:-7860}:7860"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen:0.5b}
      # TELEGRAM_BOT_TOKEN is only needed if you override CMD to run scrapeGoat.py (Telegram bot)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # Optional: set to http://whisperlive:9090 to enable speech transcription via WhisperLive.
      # Leave empty (default) to disable speech transcription or to use a locally-installed
      # openai-whisper package.
      - WHISPERLIVE_HOST=${WHISPERLIVE_HOST:-}
    volumes:
      - scrapegoat_data:/data
      - scrapegoat_qdrant:/app/tmp/local_qdrant
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Optional: GPU-accelerated WhisperLive service for speech transcription.
  # To enable, set WHISPERLIVE_HOST=http://whisperlive:9090 in your .env and
  # start with: docker compose --profile whisper up -d
  whisperlive:
    image: ghcr.io/collabora/whisperlive-gpu:latest
    container_name: whisperlive
    profiles: [whisper]
    ports:
      - "9090:9090"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  scrapegoat_data:
  scrapegoat_qdrant:
  ollama_data:
