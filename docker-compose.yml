services:
  scrapegoat:
    build:
      context: .
      args:
        # Set PYTORCH_FLAVOR=cu121 (or cu118, etc.) in your .env for NVIDIA GPU support.
        # Leave unset or 'cpu' for a smaller CPU-only image (~1.5 GB lighter).
        PYTORCH_FLAVOR: ${PYTORCH_FLAVOR:-cpu}
    image: scrapegoat:latest
    container_name: scrapegoat
    ports:
      - "${GRADIO_PORT:-7860}:7860"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen:0.5b}
      # TELEGRAM_BOT_TOKEN is only needed if you override CMD to run ScrapeGoat.py (Telegram bot)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # Optional: set to http://whisperlive:9090 to enable speech transcription via WhisperLive.
      # Leave empty (default) to disable speech transcription or to use a locally-installed
      # openai-whisper package.
      - WHISPERLIVE_HOST=${WHISPERLIVE_HOST:-}
      # NVIDIA GPU support: default to 'all' to expose all GPUs and driver capabilities.
      # Set to empty in your .env to disable GPU access (e.g. when no NVIDIA GPU is present).
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-all}
      # SearXNG URL for web search/scraping. Set to http://searxng:8080 when using the
      # bundled searxng service below. Leave empty to fall back to direct proxy scraping.
      - SEARXNG_HOST=${SEARXNG_HOST:-http://searxng:8080}
      # Automatic1111 (stable-diffusion-webui) API for optional image generation.
      # Set A1111_HOST to enable the Image Generation tab, e.g. http://a1111
      - A1111_HOST=${A1111_HOST:-}
      - A1111_PORT=${A1111_PORT:-7860}
      # Leave blank to use whatever model is currently loaded in A1111.
      - A1111_MODEL=${A1111_MODEL:-}
      - A1111_WIDTH=${A1111_WIDTH:-256}
      - A1111_HEIGHT=${A1111_HEIGHT:-256}
    volumes:
      - scrapegoat_data:/data
      - scrapegoat_qdrant:/app/tmp/local_qdrant
    depends_on:
      ollama:
        condition: service_healthy
      searxng:
        condition: service_started
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # SearXNG: privacy-friendly meta-search engine used as the scraping/search backend.
  # Provides a JSON search API that ScrapeGoat queries to discover and retrieve web content.
  # To run standalone (without Ollama): docker compose up searxng scrapegoat
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://localhost:8080/}
      # Override the default secret key from settings.yml with a value from .env.
      # Generate one with: python3 -c "import secrets; print(secrets.token_hex(32))"
      - SEARXNG_SECRET=${SEARXNG_SECRET:-please-change-this-secret-key-in-.env}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped

  # Optional: GPU-accelerated WhisperLive service for speech transcription.
  # To enable, set WHISPERLIVE_HOST=http://whisperlive:9090 in your .env and
  # start with: docker compose --profile whisper up -d
  whisperlive:
    image: ghcr.io/collabora/whisperlive-gpu:latest
    container_name: whisperlive
    profiles: [whisper]
    ports:
      - "9090:9090"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  scrapegoat_data:
  scrapegoat_qdrant:
  ollama_data:
